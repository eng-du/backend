services:
  mysql:
    image: mysql:8.4
    container_name: engdu-mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      TZ: Asia/Seoul
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+09:00
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_ROOT_PASSWORD}" ]
      interval: 5s
      timeout: 3s
      retries: 30

  my-server:
    container_name: engdu-app
    restart: unless-stopped
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    volumes:
      - ./logs:/logs
    ports: #nginx의 접근만 허용한다. 외부에서 8080포트 접근을 차단한다.
      - "127.0.0.1:8080:8080"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy

  promtail:
    image: grafana/promtail:latest
    env_file:
      - .env
    volumes:
      # 로그 읽기 위치를 기록하는 파일을 위해 볼륨 설정 (재시작 시 중복 방지)
      - /tmp/positions:/tmp/positions
      - ./logs:/logs
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml -config.expand-env=true

volumes:
  mysql_data: