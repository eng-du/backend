name: ci

on:
  pull_request:
    branches: ["dev", "main"]
  push:
    branches: ["dev", "main"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17 설치
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      # 권한 문제 방지용. 윈도우에서 커밋된 경우 간혹 필요
      - name: Gradle 실행 권한 부여
        run: chmod +x ./gradlew

      - name: 테스트 코드 실행
        run: ./gradlew test

      - name: bootJar 빌드 확인
        run: ./gradlew bootJar